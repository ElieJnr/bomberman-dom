<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Sarpanch:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&family=Sarpanch:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <title>Document</title>
</head>

<body>
    <div class="gamecenter">
        <div class="gameheader">
            <div class="gamelogo">
                <img src="assets/logo.svg" alt="">
            </div>
            <div class="gamerightpart">
                <div class="lifecounter">
                    <img src="assets/lifecounter.svg" alt="">
                </div>
                <div class="gametimer">
                    Time: 00:30
                </div>
            </div>
        </div>
        <div class="gamebody">
            <div class="gamebodyleftpart">

            </div>
            <div class="gamebodyrightpart">
                <div class="gamepowerup">
                    <div class="power" id="bomb">
                        <img src="assets/bomb.svg" alt="">
                    </div>
                    <div class="power" id="speed">
                        <img src="assets/power2.svg" alt="">

                    </div>
                    <div class="power" id="flame">
                        <img src="assets/power3.svg" alt="">
                    </div>
                    <div class="power" id="special">
                        <img src="assets/power4.svg" alt="">
                    </div>
                </div>
                <div class="gamemessage">
                    <div class="messageheader">
                        Chat center
                    </div>
                    <div class="messageType">
                        <div class="thecontent">
                            <div class="messagepic">
                                <img src="assets/messagepic.svg" alt="" srcset="">
                            </div>
                            <div class="sendername">
                                Al qaida:
                            </div>
                            <div class="messagecontent">
                                HELLO THERE
                            </div>
                        </div>
                    </div>
                    <div class="messageform">
                        <input type="text" name="message" placeholder="Type a message">
                        <button>
                            <img src="assets/sendbutton.svg" alt="">
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
<script type="module" src="script.js"></script>

</html>
